application:
  actions: actions
  web: web-src
  runtimeManifest:
    packages:
      prism:
        license: Apache-2.0
        actions:
          fetch-issues:
            function: actions/fetch-issues/index.js
            web: 'yes'
            runtime: nodejs:22
            inputs:
              LOG_LEVEL: debug
              GITHUB_TOKEN: $GITHUB_TOKEN
              TARGET_REPOS: $TARGET_REPOS
            annotations:
              require-adobe-auth: false
              final: true
          triage-issue:
            function: actions/triage-issue/index.js
            web: 'yes'
            runtime: nodejs:22
            inputs:
              LOG_LEVEL: debug
              AWS_BEARER_TOKEN_BEDROCK: $AWS_BEARER_TOKEN_BEDROCK
              AWS_ACCESS_KEY_ID: $AWS_ACCESS_KEY_ID
              AWS_SECRET_ACCESS_KEY: $AWS_SECRET_ACCESS_KEY
              AWS_REGION: $AWS_REGION
              BEDROCK_MODEL_ID: $BEDROCK_MODEL_ID
            annotations:
              require-adobe-auth: false
              final: true
          fix-issue:
            function: actions/fix-issue/index.js
            web: 'yes'
            runtime: nodejs:22
            limits:
              timeout: 300000
              memory: 512
            inputs:
              LOG_LEVEL: debug
              GITHUB_TOKEN: $GITHUB_TOKEN
              AWS_BEARER_TOKEN_BEDROCK: $AWS_BEARER_TOKEN_BEDROCK
              AWS_ACCESS_KEY_ID: $AWS_ACCESS_KEY_ID
              AWS_SECRET_ACCESS_KEY: $AWS_SECRET_ACCESS_KEY
              AWS_REGION: $AWS_REGION
              BEDROCK_MODEL_ID: $BEDROCK_MODEL_ID
            annotations:
              require-adobe-auth: false
              final: true
          create-pr:
            function: actions/create-pr/index.js
            web: 'yes'
            runtime: nodejs:22
            inputs:
              LOG_LEVEL: debug
              GITHUB_TOKEN: $GITHUB_TOKEN
            annotations:
              require-adobe-auth: false
              final: true
          approve-pr:
            function: actions/approve-pr/index.js
            web: 'yes'
            runtime: nodejs:22
            inputs:
              LOG_LEVEL: debug
              GITHUB_TOKEN: $GITHUB_TOKEN
            annotations:
              require-adobe-auth: false
              final: true
          refix-pr:
            function: actions/refix-pr/index.js
            web: 'yes'
            runtime: nodejs:22
            limits:
              timeout: 300000
              memory: 512
            inputs:
              LOG_LEVEL: debug
              GITHUB_TOKEN: $GITHUB_TOKEN
              AWS_BEARER_TOKEN_BEDROCK: $AWS_BEARER_TOKEN_BEDROCK
              AWS_ACCESS_KEY_ID: $AWS_ACCESS_KEY_ID
              AWS_SECRET_ACCESS_KEY: $AWS_SECRET_ACCESS_KEY
              AWS_REGION: $AWS_REGION
              BEDROCK_MODEL_ID: $BEDROCK_MODEL_ID
            annotations:
              require-adobe-auth: false
              final: true
          notify:
            function: actions/notify/index.js
            web: 'yes'
            runtime: nodejs:22
            inputs:
              LOG_LEVEL: debug
              SLACK_WEBHOOK_URL: $SLACK_WEBHOOK_URL
            annotations:
              require-adobe-auth: false
              final: true
          settings:
            function: actions/settings/index.js
            web: 'yes'
            runtime: nodejs:22
            inputs:
              LOG_LEVEL: debug
              TARGET_REPOS: $TARGET_REPOS
            annotations:
              require-adobe-auth: false
              final: true
